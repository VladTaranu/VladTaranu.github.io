    .social-icons a:hover {

    }

    }

</head>
<body>
  <div class="social-icons">

  </div>

  <script>
    var isCopying = false; // Flag to track copying state

    function copyDiscordUsername(event) {
      if (isCopying) return; // If copying is in progress, prevent further clicks
      event.preventDefault();
      
      var discordUsername = "vladtaranu";
      isCopying = true; // Set flag to indicate copying process is ongoing

      var textarea = document.createElement('textarea');
      textarea.value = discordUsername;
      textarea.style.position = 'fixed';
      textarea.style.opacity = 0;
      document.body.appendChild(textarea);

      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);

      var icon = event.currentTarget.querySelector('i');
      icon.classList.remove('fab', 'fa-discord');
      icon.classList.add('far', 'fa-copy');

      setTimeout(function() {
        icon.classList.remove('far', 'fa-copy');
        icon.classList.add('fab', 'fa-discord');
        isCopying = false; // Reset the flag after reverting to original state
      }, 1000);
    }
  </script>
</body>
