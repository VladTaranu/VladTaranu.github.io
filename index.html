<!DOCTYPE html>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #222222; /* change background to dark grey */
      color: #ffffff; /* change font color to white */
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      box-sizing: border-box;
      overflow-x: hidden;
      overflow-y: hidden;
      flex-direction: column; /* Add this to stack elements vertically */
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column; /* Stack elements vertically on all screen sizes */
    }

    .socials {
      z-index: 1;
      text-align: center;
      width: 100%; /* Change width to 100% for full width on mobile */
    }

    .donut {
      width: 100%; /* Change width to 100% for full width on mobile */
      transform: translate(0%, 0%); /* Remove translate */
      margin-top: 20px; /* Add some margin at the top */
    }
    @media (min-width: 768px) {
      body {
        flex-direction: row; /* Make body layout horizontal again */
        overflow-y: visible;
      }

      .container {
        flex-direction: row; /* Make container layout horizontal again */
      }

      .socials {
        width: 40%; /* Back to 40% */
        margin-right: 50px;
        transform: translate(0%, 5%);
      }

      .donut {
        width: 40%; /* Back to 40% */
        transform: translate(-40%, 0%);
        margin-top: 0; /* Remove top margin */
      }
    }
    h1 {
      color: #ffffff; /* change font color to white */
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin: 10px 0;
    }

    a {
      color: #0066C0; /* change link color to light grey */
      text-decoration: none;
    }

    a:hover {
      color: #FF6347; /* change hover color to a slightly darker grey */
    }

  </style>
</head>

  <script>
    var A = 0, B = 0, i, j, z = new Array(1760).fill(0), b = new Array(1760).fill(' ');
    var output = document.getElementById('output');
    var replacedCharIndexes = [];

    function render() {
        b.fill(' ');
        z.fill(0);
        var k;
        for(j = 0; 6.28 > j; j += 0.07)
            for(i = 0; 6.28 > i; i += 0.02) {
                var c = Math.sin(i),
                    d = Math.cos(j),
                    e = Math.sin(A),
                    f = Math.sin(j),
                    g = Math.cos(A),
                    h = d + 2,
                    D = 1 / (c * h * e + f * g + 5),
                    l = Math.cos(i),
                    m = Math.cos(B),
                    n = Math.sin(B),
                    t = c * h * g - f * e;
                var x = 0 | (40 + 30 * D * (l * h * m - t * n)),
                    y = 0 | (12 + 15 * D * (l * h * n + t * m)),
                    o = x + 80 * y,
                    N = 0 | (8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n));
                if (y < 22 && y > 0 && x > 0 && 80 > x && D > z[o]) {
                    z[o] = D;
                    b[o] = ".,-~:;=!*#$@"[N > 0 ? N : 0];
                }
            }
        for (k = 0; k < 1760; k++)
            b[k] = (k % 80 ? b[k] : '\n');
        output.innerText = b.join('');
        A += 0.04;
        B += 0.02;
        requestAnimationFrame(render);
    }

    render();
  </script>
